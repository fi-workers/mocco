[http]

# Mirror production (ADR 0006): www is canonical, apex redirects to www.
[http.middlewares.apex-redirect.redirectregex]
permanent = true
regex = "^https://mocco.work/(.*)"
replacement = "https://www.mocco.work/${1}"

[http.routers.mocco-apex]
rule = "Host(`mocco.work`)"
service = "noop@internal"
middlewares = ["apex-redirect"]
entryPoints = ["https"]
[http.routers.mocco-apex.tls]

[http.routers.mocco]
rule = "Host(`www.mocco.work`)"
service = "mocco"
entryPoints = ["https"]
[http.routers.mocco.tls]

[http.services.mocco.loadbalancer]
[[http.services.mocco.loadbalancer.servers]]
url = "http://localhost:3100"

[[tls.certificates]]
certFile = "../cert/mocco.work+1.pem"
keyFile = "../cert/mocco.work+1-key.pem"
