# CI — format · lint · typecheck · test (pglite, docker-free) · build.
# Supply-chain rules (docs/reference/ci-conventions.md):
# - third-party actions pinned to commit SHAs (tags verified via ls-remote)
# - plain `pull_request` only (never pull_request_target with checkout)
# - no secrets in PR-triggered runs; minimal explicit permissions
# - no cache in v1 (nothing shared across trust boundaries)
# - yarn itself is integrity-pinned (packageManager +sha512); dependency
#   lifecycle scripts are disabled during install (postinstall vector)
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel post-merge runs on main —
  # every main commit must finish with a completed check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Enable corepack (yarn is integrity-pinned via packageManager)
        run: corepack enable
      - name: Install (immutable, dependency lifecycle scripts disabled)
        run: yarn install --immutable
        env:
          YARN_ENABLE_SCRIPTS: 'false'
      # Every step below runs a root package.json script — the exact same
      # commands `yarn ci:local` (and the pre-push hook) run locally.
      - name: Format check
        run: yarn format:check
      - name: Lint + typecheck (eslint, tsc, react-doctor)
        run: yarn lint
      - name: Test (jest + pglite integration)
        run: yarn test
      - name: Migration drift check (schema.ts must match committed migrations)
        run: yarn ci:drift
      - name: Build (Next.js)
        run: yarn build
