# CI — every step is its own matrix job: parallel, isolated (fail-fast off, one
# red step never cancels the rest), individually re-runnable. Each leg runs the
# exact root package.json script that `yarn verify` (pre-push) composes
# locally — one source of truth, two schedulers.
# The `ci` gate job is the single required check for branch protection.
#
# Supply-chain rules (docs/reference/ci-conventions.md):
# - third-party actions pinned to commit SHAs (tags verified via ls-remote)
# - plain `pull_request` only (never pull_request_target with checkout)
# - no secrets in PR-triggered runs; minimal explicit permissions
# - no cache in v1 (nothing shared across trust boundaries)
# - yarn itself is integrity-pinned (packageManager +sha512); dependency
#   lifecycle scripts are disabled during install (postinstall vector)
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel post-merge runs on main —
  # every main commit must finish with a completed check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  step:
    name: ${{ matrix.step }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        step:
          - format:check
          - lint-common
          - lint-backend
          - lint-frontend
          - lint-react-doctor
          - lint-e2e
          - test
          - db:drift
          - schema:drift
          - build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Enable corepack (yarn is integrity-pinned via packageManager)
        run: corepack enable
      - name: Install (immutable, dependency lifecycle scripts disabled)
        run: yarn install --immutable
        env:
          YARN_ENABLE_SCRIPTS: 'false'
      # matrix.step values are the static list above — never derived from the PR.
      - name: yarn ${{ matrix.step }}
        run: yarn ${{ matrix.step }}

  e2e:
    # Playwright against the real server + a real Postgres (node-postgres, not
    # the pglite the unit tests use) — the session cookie round-trip. Its own job
    # because it needs a service container + a browser, unlike the uniform matrix.
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
        env:
          POSTGRES_USER: mocco
          POSTGRES_PASSWORD: mocco
          POSTGRES_DB: mocco
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mocco -d mocco"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://mocco:mocco@localhost:5432/mocco
      # Ephemeral signing key for throwaway test sessions — not a real secret.
      AUTH_SECRET: e2e-ephemeral-secret-not-for-prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Enable corepack (yarn is integrity-pinned via packageManager)
        run: corepack enable
      - name: Install (immutable, dependency lifecycle scripts disabled)
        run: yarn install --immutable
        env:
          YARN_ENABLE_SCRIPTS: 'false'
      - name: Apply migrations
        run: yarn db:migrate
      - name: Install the Playwright browser (chromium only; version pinned in package.json)
        run: yarn e2e exec playwright install --with-deps chromium
      - name: e2e (Playwright builds + starts the app, then drives it)
        run: yarn e2e test

  ci:
    # Branch-protection gate: the one required check, green only when every leg is.
    needs: [step, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All checks succeeded
        run: '[ "${{ needs.step.result }}" = "success" ] && [ "${{ needs.e2e.result }}" = "success" ]'
