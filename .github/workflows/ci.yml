# CI — every step is its own matrix job: parallel, isolated (fail-fast off, one
# red step never cancels the rest), individually re-runnable. Each leg runs the
# exact root package.json script that `yarn verify` (pre-push) composes
# locally — one source of truth, two schedulers.
# The `ci` gate job is the single required check for branch protection.
#
# Supply-chain rules (docs/reference/ci-conventions.md):
# - third-party actions pinned to commit SHAs (tags verified via ls-remote)
# - plain `pull_request` only (never pull_request_target with checkout)
# - no secrets in PR-triggered runs; minimal explicit permissions
# - no cache in v1 (nothing shared across trust boundaries)
# - yarn itself is integrity-pinned (packageManager +sha512); dependency
#   lifecycle scripts are disabled during install (postinstall vector)
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel post-merge runs on main —
  # every main commit must finish with a completed check.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  step:
    name: ${{ matrix.step }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        step:
          - format:check
          - lint-backend
          - lint-frontend
          - test
          - db:drift
          - build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Enable corepack (yarn is integrity-pinned via packageManager)
        run: corepack enable
      - name: Install (immutable, dependency lifecycle scripts disabled)
        run: yarn install --immutable
        env:
          YARN_ENABLE_SCRIPTS: 'false'
      # matrix.step values are the static list above — never derived from the PR.
      - name: yarn ${{ matrix.step }}
        run: yarn ${{ matrix.step }}

  ci:
    # Branch-protection gate: the one required check, green only when every leg is.
    needs: step
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All steps succeeded
        run: '[ "${{ needs.step.result }}" = "success" ]'
