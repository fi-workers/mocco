# CI — lint · typecheck · test (pglite, docker-free) · build.
# Supply-chain rules (docs/reference/ci-conventions.md):
# - third-party actions pinned to commit SHAs
# - plain `pull_request` only (never pull_request_target with checkout)
# - no secrets in PR-triggered runs; minimal explicit permissions
# - no cache in v1 (nothing shared across trust boundaries)
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Enable corepack (yarn 4)
        run: corepack enable
      - name: Install (immutable — lockfile is authoritative)
        run: yarn install --immutable
      - name: Format check
        run: yarn format:check
      - name: Lint + typecheck (backend, frontend)
        run: yarn lint
      - name: Test (jest + pglite integration)
        run: yarn test
      - name: Build (Next.js)
        run: yarn frontend build
