<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mocco — prototype</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="proto-banner">🧪 PROTOTYPE — non-functional click-through. All data is mock. No real deploys, approvals, or verification happen.</div>
  <div class="app">
    <div class="nav-backdrop" id="navBackdrop"></div>
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div><div class="name">Mocco</div><div class="tag">deploy governance</div></div>
      </div>
      <div class="side-ctx">
        <div class="repo-switch" id="wsSwitch">
          <button class="repo-pill" id="wsBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="ico"><svg class="ic-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span><span id="wsLabel">algocare-lab</span><span class="chev">▾</span>
          </button>
          <div class="repo-menu" id="wsMenu" role="listbox" hidden></div>
        </div>
        <div class="repo-switch" id="repoSwitch">
          <button class="repo-pill" id="repoBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="ico"><svg class="ic-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span><span id="repoLabel">algo-care/algocd</span><span class="chev">▾</span>
          </button>
          <div class="repo-menu" id="repoMenu" role="listbox" hidden></div>
        </div>
      </div>
      <nav id="nav"></nav>
      <div class="spacer"></div>
      <div class="footer">write ≠ deploy · GitHub Actions runs it, Mocco governs it</div>
    </aside>
    <div class="main">
      <div class="topbar">
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Collapse/expand menu">☰</button>
        <div class="crumbs" id="crumbs"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
  <script src="mock/data.js"></script>
  <script src="app.js"></script>
</body>
</html>
